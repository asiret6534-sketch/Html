  <!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KazanTuBe</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f1f5f9;
}

.app{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:white;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:#0f172a;
    color:white;
    padding:30px 20px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

.balance-title{
    font-size:14px;
    opacity:0.8;
}

.balance{
    font-size:34px;
    font-weight:700;
    margin-top:5px;
}

/* CONTENT */
.content{
    padding:20px;
    flex:1;
}

.card{
    background:#ffffff;
    border-radius:16px;
    padding:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    margin-bottom:15px;
}

.card h3{
    font-size:16px;
    margin-bottom:8px;
}

.card p{
    font-size:14px;
    color:#64748b;
}

.card button{
    margin-top:12px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

.card button:active{
    transform:scale(0.98);
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    border-top:1px solid #eee;
    background:white;
}

.nav button{
    background:none;
    border:none;
    font-size:12px;
    color:#64748b;
}

.nav button.active{
    color:#0f172a;
    font-weight:600;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div class="balance-title">Toplam Bakiye</div>
        <div class="balance" id="balance">₺0</div>
    </div>

    <div class="content">

        <div class="card">
            <h3>🎯 Günlük Görev</h3>
            <p>Reklam izleyerek ₺5 kazan.</p>
            <button onclick="earn()">Görevi Yap</button>
        </div>

        <div class="card">
            <h3>👥 Referans Kazancı</h3>
            <p>Arkadaş davet et ₺10 kazan.</p>
        </div>

        <div class="card">
            <h3>💳 Çekim Talebi</h3>
            <p>Minimum ₺100 olduğunda çekim yapabilirsin.</p>
        </div>

    </div>

    <div class="nav">
        <button class="active">Ana Sayfa</button>
        <button>Geçmiş</button>
        <button>Profil</button>
    </div>

</div>

<script>
let money = 0;

function earn(){
    money += 5;
    document.getElementById("balance").innerText = "₺" + money;
}
</script>

</body>
</html>
