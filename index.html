<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KazanTuBe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background:#1e293b;
    width:350px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    text-align:center;
}

h1{
    font-weight:600;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

input::placeholder{
    color:#94a3b8;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.switch{
    margin-top:15px;
    font-size:14px;
    color:#94a3b8;
    cursor:pointer;
}

.hidden{
    display:none;
}

.points{
    font-size:28px;
    margin:15px 0;
    font-weight:600;
}
</style>
</head>

<body>

<div class="card" id="authBox">
    <h1>KazanTuBe</h1>
    <input id="email" placeholder="E-posta">
    <input id="password" type="password" placeholder="Şifre">
    <button onclick="login()">Giriş Yap</button>
    <button onclick="register()">Kayıt Ol</button>
</div>

<div class="card hidden" id="dashboard">
    <h1>Dashboard</h1>
    <div class="points" id="points">0</div>
    <button onclick="task()">Görev Yap (+5)</button>
    <button onclick="logout()">Çıkış Yap</button>
</div>

<script>
let currentUser = null;
let userPoints = 0;

function register(){
    alert("Firebase bağlanınca aktif olacak.");
}

function login(){
    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}

function logout(){
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("authBox").classList.remove("hidden");
}

function task(){
    userPoints += 5;
    document.getElementById("points").innerText = userPoints;
}
</script>

</body>
</html>
