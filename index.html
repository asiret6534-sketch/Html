<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KazanTuBe Application</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>KazanTuBe</h1>
            <nav>
                <button id="login-tab">Login</button>
                <button id="register-tab">Register</button>
            </nav>
        </header>
        <main>
            <section id="login-form" class="form-section">
                <h2>Login</h2>
                <form>
                    <input type="email" id="login-email" placeholder="Email" required />
                    <input type="password" id="login-password" placeholder="Password" required />
                    <button type="submit">Login</button>
                </form>
            </section>
            <section id="register-form" class="form-section" style="display:none;">
                <h2>Register</h2>
                <form>
                    <input type="email" id="register-email" placeholder="Email" required />
                    <input type="password" id="register-password" placeholder="Password" required />
                    <button type="submit">Register</button>
                </form>
            </section>
            <section id="dashboard" style="display:none;">
                <h2>Dashboard</h2>
                <div id="stats">
                    <p>Total Users: <span id="total-users">0</span></p>
                    <p>Total Referrals: <span id="total-referrals">0</span></p>
                </div>
                <div id="referral-system">
                    <h3>Your Referral Link:</h3>
                    <input type="text" id="referral-link" readonly />
                    <button id="copy-button">Copy</button>
                </div>
            </section>
            <div id="toast" class="toast">Action successful!</div>
        </main>
        <footer>
            <p>&copy; 2026 KazanTuBe</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
