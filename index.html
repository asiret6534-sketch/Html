<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KazanTuBe Uygulaması</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; }
        .container { width: 80%; margin: auto; overflow: hidden; }
        header { background: #333; color: #fff; padding: 20px 0; text-align: center; }
        footer { text-align: center; margin-top: 20px; }
        /* Add more styles here for your UI */
    </style>
</head>
<body>
    <header>
        <h1>KazanTuBe Uygulaması</h1>
    </header>
    <div class="container">
        <h2>Giriş Yap</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="E-posta" required>
            <input type="password" id="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>
        <h2>Kayıt Ol</h2>
        <form id="signupForm">
            <input type="email" id="signupEmail" placeholder="E-posta" required>
            <input type="password" id="signupPassword" placeholder="Şifre" required>
            <button type="submit">Kaydol</button>
        </form>
        <h2>Görev Tamamla</h2>
        <button id="completeTask">Görevi Tamamla</button>
    </div>
    <footer>
        <p>&copy; 2026 KazanTuBe Uygulaması</p>
    </footer>
    <script>
        const auth = firebase.auth();
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .then(() => alert('Giriş Başarılı'))
                .catch(err => alert(err.message));
        });
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            auth.createUserWithEmailAndPassword(email, password)
                .then(() => alert('Kayıt Başarılı'))
                .catch(err => alert(err.message));
        });
        document.getElementById('completeTask').addEventListener('click', () => {
            // Add task completion logic here.
            alert('Görev Tamamlandı!');
        });
    </script>
</body>
</html>
